
services:
  api:
    build: .
    container_name: ai-chat-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: ai-chat-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]

      interval: 5s

      timeout: 5s

      retries: 10

  ollama:
    image: ollama/ollama
    container_name: ai-chat-ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama:/root/.ollama

    restart: unless-stopped

  ollama-init:
    image: ollama/ollama

    depends_on:
      - ollama

    environment:
      OLLAMA_HOST: "http://ollama:11434"

    volumes:
      - ollama:/root/.ollama

    entrypoint: >
      sh -c "
        sleep 10 &&
        ollama pull ${LLM_MODEL}
      "

    restart: "no"

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  ollama: